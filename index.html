<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gifted Maurice - GitHub Profile</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }
    .container {
      max-width: 900px;
      width: 100%;
    }
    .hero {
      text-align: center;
      margin-bottom: 2rem;
    }
    .hero img {
      max-width: 100%;
      border-radius: 8px;
    }
    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .card h2 {
      font-size: 1.1rem;
      color: #8b949e;
      margin-bottom: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .connect {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      align-items: center;
    }
    .connect a img {
      width: 48px;
      height: 48px;
      object-fit: contain;
      transition: transform 0.2s;
    }
    .connect a img:hover { transform: scale(1.1); }
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    .stats-grid img {
      width: 100%;
      border-radius: 8px;
    }
    .trophy img {
      width: 100%;
      border-radius: 8px;
    }
    .visitors {
      text-align: center;
      margin-bottom: 1rem;
    }
    .visitors img { border-radius: 4px; }
    @media (max-width: 600px) {
      .stats-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <img src="https://readme-typing-svg.demolab.com?font=Anton&size=30&pause=998&color=F51FFF&background=F7F2F20A&vCenter=true&random=false&width=480&lines=Hi+Visitor%F0%9F%91%8B!;My+Name+is+Gifted+Maurice;I+am+a+Self+Learned+Full-Stack+Developer;I+am+from+Kenya;Nice+to+Meet+You" alt="Gifted Maurice" />
    </div>

    <div class="card">
      <img src="https://cardivo.vercel.app/api?name=Gifted%20Maurice&description=Hi,%20I'm%20a%20self%20Taught%20Half-Stack%20Developer%20and%20I'm%2022%20Years%20Nice%20to%20Meet%20You%20%F0%9F%91%8B&image=https://github.com/mauricegift.png&backgroundColor=green&instagram=giftedtechnexus&linkedin=giftedtechke&github=mauricegift&twitter=GiftedMauriceKe" alt="Profile Card" style="width:100%;border-radius:8px;" />
    </div>

    <div class="visitors">
      <img src="https://komarev.com/ghpvc/?username=mauricegift&label=Visitors%20count&color=10d9c3&style=plastic" alt="Visitors count" />
    </div>

    <div class="card">
      <h2>Connect With Me</h2>
      <div class="connect">
        <a href="https://whatsapp.com/channel/0029Vb3hlgX5kg7G0nFggl0Y" target="_blank">
          <img src="https://raw.githubusercontent.com/shizothetechie/database/main/icon/WhatsApp.png" alt="WhatsApp" />
        </a>
        <a href="https://Instagram.com/giftedtechnexus" target="_blank">
          <img src="https://raw.githubusercontent.com/shizothetechie/database/main/icon/Instagram2.png" alt="Instagram" />
        </a>
      </div>
    </div>

    <div class="card">
      <h2>GitHub Stats</h2>
      <div class="stats-grid">
        <div>
          <img src="https://github-readme-stats.vercel.app/api?username=mauricegift&theme=dark&show_icons=true&count_private=true" alt="GitHub Stats" />
          <br/><br/>
          <img src="https://github-readme-streak-stats.herokuapp.com?user=mauricegift&theme=merko&border_radius=70&fire=EB5454&stroke=EB5454&border=EB5454" alt="GitHub Streak" />
        </div>
        <div>
          <img src="https://github-readme-stats.anuraghazra1.vercel.app/api/top-langs/?username=mauricegift&theme=dark&hide_border=false&no-bg=true&no-frame=true&langs_count=10" alt="Top Languages" />
        </div>
      </div>
    </div>

    <div class="card trophy">
      <h2>Trophies</h2>
      <img src="https://github-profile-trophy.vercel.app/?username=mauricegift&theme=radical&row=1&column=7&margin-h=15&margin-w=5&no-bg=true" alt="GitHub Trophy" />
    </div>
  </div>
</body>
</html>
